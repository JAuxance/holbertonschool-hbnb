<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title }} | HBnB</title>
    <meta
        name="description"
        content="HBnB front-end experience for browsing places, viewing details, and sharing reviews."
    >
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo.png') }}">
    {% block extra_styles %}{% endblock %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <script defer src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block extra_scripts %}{% endblock %}
</head>
<body data-page="{{ page_name }}">
    <div class="site-backdrop"></div>
    <div class="site-shell">
        <header class="site-header">
            <a class="brand" href="{{ url_for('web.index') }}" aria-label="HBnB Home">
                <img
                    src="{{ url_for('static', filename='img/logo.png') }}"
                    alt="HBnB logo"
                    class="logo"
                >
                <span class="brand-copy">
                    <span class="eyebrow">HBnB</span>
                    <span class="brand-name">Slow stays, bright spaces.</span>
                </span>
            </a>

            <nav class="main-nav" aria-label="Primary navigation">
                <a
                    href="{{ url_for('web.index') }}"
                    class="{{ 'is-active' if page_name in ['index', 'place', 'add-review', 'add-place', 'signup', 'profile', 'settings'] else '' }}"
                >
                    Places
                </a>
                <a href="/api/v1/">API Docs</a>
            </nav>

            <div class="auth-actions" id="auth-actions">
                <div class="auth-cluster auth-cluster-guest">
                    <a href="{{ url_for('web.signup') }}" class="utility-link">Sign up</a>
                    <a
                        href="{{ url_for('web.login') }}"
                        class="login-button"
                        id="auth-link"
                    >
                        Login
                    </a>
                </div>
            </div>
        </header>

        <main class="page-main">
            {% block content %}{% endblock %}
        </main>

        <footer class="site-footer">
            <p>All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
