{% extends "base.html" %}

{% block content %}
<section class="narrow-layout">
    <div class="section-head compact">
        <div>
            <p class="eyebrow" data-i18n="login.eyebrow">Welcome back</p>
            <h1 data-i18n="login.title">Login Form</h1>
        </div>
        <p class="section-text" data-i18n="login.text">
            Sign in with your HBnB account to create reviews and access authenticated actions.
        </p>
    </div>

    <div class="form-card">
        <form id="login-form" class="form" action="/api/v1/auth/login" method="post">
            <div class="field">
                <label for="email" data-i18n="common.email">Email</label>
                <input id="email" name="email" type="email" autocomplete="email" required>
            </div>

            <div class="field">
                <label for="password" data-i18n="common.password">Password</label>
                <input
                    id="password"
                    name="password"
                    type="password"
                    autocomplete="current-password"
                    required
                >
            </div>

            <button type="submit" class="primary-button" data-i18n="auth.sign_in">Sign In</button>
            <p id="login-message" class="form-message" aria-live="polite"></p>
        </form>
    </div>
</section>
{% endblock %}
