{% extends "base.html" %}

{% block content %}
<section class="narrow-layout">
    <div class="section-head compact">
        <div>
            <p class="eyebrow">Admin tools</p>
            <h1>Create User</h1>
        </div>
        <p class="section-text">
            Add a new platform user from the website. This action uses the existing admin-only user API.
        </p>
    </div>

    <div id="user-auth-required" class="info-banner hidden" aria-live="polite"></div>

    <div class="form-card">
        <form id="user-form" class="form" action="/api/v1/users/" method="post">
            <div class="field-grid field-grid-2">
                <div class="field">
                    <label for="first_name">First Name</label>
                    <input
                        id="first_name"
                        name="first_name"
                        type="text"
                        maxlength="50"
                        autocomplete="given-name"
                        required
                    >
                </div>

                <div class="field">
                    <label for="last_name">Last Name</label>
                    <input
                        id="last_name"
                        name="last_name"
                        type="text"
                        maxlength="50"
                        autocomplete="family-name"
                        required
                    >
                </div>
            </div>

            <div class="field">
                <label for="email">Email</label>
                <input
                    id="email"
                    name="email"
                    type="email"
                    autocomplete="email"
                    required
                >
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input
                    id="password"
                    name="password"
                    type="password"
                    minlength="6"
                    autocomplete="new-password"
                    required
                >
            </div>

            <button type="submit" class="primary-button">Create User</button>
            <p id="user-message" class="form-message" aria-live="polite"></p>
        </form>
    </div>
</section>
{% endblock %}
